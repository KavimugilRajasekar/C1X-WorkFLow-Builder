<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircuitFlow Canvas - Web Component Demo</title>
    <meta name="description" content="CircuitFlow Canvas - A modern visual workflow builder as a framework-agnostic Web Component">
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="stylesheet" href="../dist/styles.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: hsl(228, 12%, 8%);
        color: hsl(220, 20%, 92%);
      }
      .demo-header {
        padding: 12px 20px;
        background: hsl(228, 12%, 10%);
        border-bottom: 1px solid hsl(228, 10%, 18%);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .demo-header h1 {
        font-size: 14px;
        font-weight: 600;
      }
      .demo-header span {
        font-size: 11px;
        color: hsl(220, 10%, 50%);
        font-family: monospace;
      }
      .demo-container {
        width: 100vw;
        height: calc(100vh - 45px);
      }
      c1x-workflow-builder {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>CircuitFlow Canvas</h1>
      <span>Web Component Demo</span>
    </div>
    <div class="demo-container">
      <c1x-workflow-builder show-branding="true"></c1x-workflow-builder>
    </div>
    <script type="module" src="../dist/index.js"></script>
    <script>
      // Listen to web component events
      document.querySelector('c1x-workflow-builder').addEventListener('onChange', (e) => {
        console.log('[CircuitFlow] Workflow changed:', e.detail.workflow);
      });
      document.querySelector('c1x-workflow-builder').addEventListener('onSave', (e) => {
        console.log('[CircuitFlow] Workflow saved:', e.detail.workflow);
      });
    </script>
  </body>
</html>
